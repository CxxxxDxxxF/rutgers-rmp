services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rmp-web
    ports:
      - "3000:3000"
    env_file: .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Development service with hot reload
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rmp-web-dev
    ports:
      - "3001:3000"
    env_file: .env.local
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./public:/app/public
      - ./scripts:/app/scripts
    profiles:
      - dev
